name: tests

on:
  push:
  pull_request:

jobs:
  posture-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: PYTHONPATH=src python -m unittest discover -s tests -v
      - run: PYTHONPATH=src python -m azure_security_posture_reviewer.reviewer
